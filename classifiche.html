<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0f2e">
  <title>Classifiche — Royal Arena</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* ========================================================
       RESET & BASE (identico a index.html)
       ======================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0f2e;
      --bg2:      #111a42;
      --bg3:      #1a2558;
      --gold:     #f5c842;
      --gold-dim: #c9a12e;
      --text:     #e8e0d0;
      --muted:    #8890b0;
      --red:      #e74c3c;
      --radius:   12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 18px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ========================================================
       HEADER
       ======================================================== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      background: var(--bg);
      border-bottom: 1px solid var(--bg3);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 20px;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .nav-link {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 1px;
      padding: 6px 12px;
      border: 1px solid var(--bg3);
      border-radius: 6px;
      transition: color .2s, border-color .2s;
    }
    .nav-link:hover { color: var(--gold); border-color: var(--gold); }

    /* ========================================================
       MAIN
       ======================================================== */
    main {
      padding: 24px 20px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ========================================================
       TABS
       ======================================================== */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      background: var(--bg2);
      border: none;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 14px;
      cursor: pointer;
      transition: background .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn + .tab-btn { border-left: 1px solid var(--bg3); }
    .tab-btn.active {
      background: var(--bg3);
      color: var(--gold);
    }

    /* ========================================================
       LEADERBOARD
       ======================================================== */
    .leaderboard {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .leaderboard-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 18px;
      border: 1px solid var(--bg3);
    }

    .leaderboard-row.rank-1 { border-color: var(--gold); box-shadow: 0 0 14px rgba(245,200,66,.15); }
    .leaderboard-row.rank-2 { border-color: #aaa; }
    .leaderboard-row.rank-3 { border-color: #c87d3e; }

    .lb-rank {
      font-size: 22px;
      width: 32px;
      flex-shrink: 0;
      text-align: center;
    }

    .lb-name {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: 17px;
    }

    .lb-pts {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
    }

    /* ========================================================
       STORICO TORNEI
       ======================================================== */
    .storico-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .tournament-card {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      padding: 16px;
    }

    .tournament-card.invalid {
      opacity: .6;
      border-style: dashed;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .card-date {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--text);
    }

    .card-badge {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--gold);
    }

    .badge-invalid {
      color: var(--muted);
      font-style: italic;
    }

    .card-players {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 10px;
      font-style: italic;
    }

    .card-matches {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hist-match {
      font-size: 15px;
      color: var(--text);
      padding: 4px 0;
      border-top: 1px solid var(--bg3);
    }

    .hist-match:first-child { border-top: none; }

    .hist-match strong { color: var(--gold); }

    /* ========================================================
       UTILS
       ======================================================== */
    .empty-msg, .loading {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 20px 0;
    }

    .error-msg {
      color: var(--red);
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="nav-link">← ARENA</a>
    <div class="logo">Classifiche</div>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-btn active" data-tab="classifica" onclick="switchTab('classifica')">
        CLASSIFICA
      </button>
      <button class="tab-btn" data-tab="storico" onclick="switchTab('storico')">
        STORICO
      </button>
    </div>

    <div id="tab-content">
      <p class="loading">Caricamento...</p>
    </div>
  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- App scripts -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/api.js"></script>
  <script src="js/classifiche.js"></script>

</body>
</html>
