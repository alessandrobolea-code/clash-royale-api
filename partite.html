<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0f2e">
  <title>Partite — Royal Arena</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/ui/icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Barra di stato polling */
    .poll-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin-bottom: 20px;
      padding: 10px 14px;
      background: var(--bg2);
      border-radius: var(--radius);
      border: 1px solid var(--bg3);
    }

    .poll-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 7px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    /* Battle rows */
    .battles-list { display: flex; flex-direction: column; gap: 8px; }

    .battle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 12px 14px;
      border-left: 4px solid transparent;
    }
    .battle-win  { border-left-color: var(--green); }
    .battle-loss { border-left-color: var(--red); }

    .battle-result-badge {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      width: 22px;
      flex-shrink: 0;
      text-align: center;
    }
    .battle-win  .battle-result-badge { color: var(--green); }
    .battle-loss .battle-result-badge { color: var(--red); }

    .battle-info { flex: 1; min-width: 0; }

    .battle-players {
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .our-side  { color: var(--text); font-weight: 600; }
    .battle-vs { color: var(--muted); font-size: 13px; }
    .opp-side  { color: var(--muted); }
    .reg-name  { color: var(--gold); }

    .battle-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="nav-link">← ARENA</a>
    <div class="logo">Partite</div>
    <a href="classifiche.html" class="nav-link">CLASSIF.</a>
  </header>

  <main>
    <div class="poll-bar">
      <span><span class="poll-dot"></span><span id="poll-status">Avvio...</span></span>
      <span id="next-poll"></span>
    </div>

    <div id="battles-content">
      <p class="loading">Caricamento...</p>
    </div>
  </main>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/api.js"></script>
  <script src="js/partite.js"></script>

</body>
</html>
