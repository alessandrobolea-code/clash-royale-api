<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0f2e">
  <title>Royal Arena</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/ui/icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; flex-direction: column; overflow: hidden; height: 100dvh; }
    main {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding-bottom: calc(64px + max(20px, env(safe-area-inset-bottom)));
    }
    .idle-view {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      gap: 0;
    }
    .player-list-card {
      flex: 1;
      min-height: 0;
      max-height: calc(100dvh - 290px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: rgba(10, 15, 46, 0.6);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      padding: 10px;
      margin-bottom: 16px;
    }
    .logo span { font-size: 22px; }

    /* Player list */
    .player-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .player-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(17, 26, 66, 0.82);
      border: 2px solid var(--bg3);
      border-radius: 14px;
      padding: 12px 16px;
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }
    .player-card:active { opacity: .8; }
    .player-card.selected {
      border-color: var(--gold);
      background: rgba(245, 200, 66, 0.12);
    }

    .player-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 18px;
      color: var(--muted);
    }

    .player-info { flex: 1; min-width: 0; }

    .player-name {
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-card.selected .player-name { color: var(--gold); }

    .player-subtag {
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 11px;
      color: var(--gold-dim);
      letter-spacing: 0.5px;
      margin-top: 3px;
    }

    .player-pts {
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 15px;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Bottone AVVIA */
    .start-wrap {
      flex-shrink: 0;
    }

    .btn-start {
      width: 100%;
      height: 58px;
      border-radius: 12px;
      background: linear-gradient(180deg, #ffe066 0%, #f5a800 60%, #e08c00 100%);
      border: none;
      border-bottom: 4px solid #9a5c00;
      color: #6b3500;
      font-family: 'ClashRoyale', 'Cinzel Decorative', cursive;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.45);
      transition: transform .1s, box-shadow .1s, border-bottom-width .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    .btn-start:disabled { opacity: .5; cursor: not-allowed; }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .status-bar.paused { border-color: var(--gold-dim); }

    .dot-live {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 1.4s infinite;
      flex-shrink: 0;
    }
    .dot-paused {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold-dim);
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    .status-text {
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 1px;
      flex: 1;
    }

    .timer {
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      min-width: 44px;
      text-align: right;
    }

    .participants-bar {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .pchip {
      background: var(--bg3);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 12px;
      color: var(--text);
    }

    .match-type-badge {
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 1px;
    }

    /* Match rows */
    .matches-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .match-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--bg3);
    }

    .match-num {
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 12px;
      color: var(--muted);
      width: 16px;
      flex-shrink: 0;
    }

    .match-players {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 17px;
    }

    .winner { color: var(--gold); font-weight: 600; }
    .loser  { color: var(--muted); }
    .vs     { color: var(--muted); font-size: 13px; }
    .crowns { font-size: 15px; white-space: nowrap; }

    .active-footer { display: flex; flex-direction: column; gap: 10px; }

    .pause-msg {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Podio */
    .complete-view { text-align: center; }

    .complete-title {
      font-family: 'ClashRoyale', 'Cinzel Decorative', cursive;
      font-size: 20px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .podio {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
    }

    .podio-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 18px;
      border: 1px solid var(--bg3);
    }

    .podio-row.rank-1 { border-color: var(--gold); box-shadow: 0 0 14px rgba(245,200,66,.15); }
    .podio-row.rank-2 { border-color: #aaa; }
    .podio-row.rank-3 { border-color: #c87d3e; }

    .medal { font-size: 24px; }

    .podio-name {
      flex: 1;
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 18px;
      text-align: left;
    }

    .podio-pts {
      font-family: 'ClashRoyale', 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
    }

    .complete-footer { margin-top: 8px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Torneo</div>
  </header>

  <main>
    <div id="app">
      <p class="loading">Caricamento...</p>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="classifiche.html" class="bn-item">
      <img src="images/ui/social.png" class="bn-icon">
      <span>CLASSIF.</span>
    </a>
    <a href="index.html" class="bn-item bn-center active">
      <div class="bn-center-ring">
        <img src="images/ui/battle.png" class="bn-icon-center">
      </div>
      <span>ARENA</span>
    </a>
    <a href="statistiche.html" class="bn-item">
      <img src="images/ui/leaderboard.png" class="bn-icon">
      <span>STATS</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/api.js"></script>
  <script src="js/home.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

</body>
</html>
