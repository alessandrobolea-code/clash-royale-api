<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0f2e">
  <title>Royal Arena</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* ========================================================
       RESET & BASE
       ======================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0f2e;
      --bg2:      #111a42;
      --bg3:      #1a2558;
      --gold:     #f5c842;
      --gold-dim: #c9a12e;
      --text:     #e8e0d0;
      --muted:    #8890b0;
      --green:    #2ecc71;
      --red:      #e74c3c;
      --radius:   12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 18px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ========================================================
       HEADER
       ======================================================== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      background: var(--bg);
      border-bottom: 1px solid var(--bg3);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 20px;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .logo span { font-size: 22px; }

    .nav-link {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 1px;
      padding: 6px 12px;
      border: 1px solid var(--bg3);
      border-radius: 6px;
      transition: color .2s, border-color .2s;
    }
    .nav-link:hover { color: var(--gold); border-color: var(--gold); }

    /* ========================================================
       MAIN CONTENT
       ======================================================== */
    main {
      padding: 24px 20px;
      max-width: 480px;
      margin: 0 auto;
      min-height: calc(100vh - 64px);
    }

    /* ========================================================
       SECTION LABEL
       ======================================================== */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ========================================================
       PLAYER GRID — chips selezionabili
       ======================================================== */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .chip {
      background: var(--bg2);
      border: 2px solid var(--bg3);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 6px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: background .15s, border-color .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:active { opacity: .7; }
    .chip.selected {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
      font-weight: bold;
    }

    /* ========================================================
       TYPE TOGGLE
       ======================================================== */
    .type-toggle {
      display: flex;
      gap: 10px;
    }

    .toggle-btn {
      flex: 1;
      background: var(--bg2);
      border: 2px solid var(--bg3);
      color: var(--muted);
      border-radius: 8px;
      padding: 12px;
      font-family: 'Cinzel', serif;
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-btn.active {
      background: var(--bg3);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ========================================================
       AVVIA BUTTON (cerchio oro)
       ======================================================== */
    .start-wrap {
      display: flex;
      justify-content: center;
      margin-top: 36px;
    }

    .btn-start {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      color: var(--bg);
      font-family: 'Cinzel Decorative', cursive;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(245,200,66,.35), 0 4px 16px rgba(0,0,0,.4);
      transition: transform .1s, box-shadow .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active { transform: scale(.94); box-shadow: 0 0 12px rgba(245,200,66,.2); }
    .btn-start:disabled { opacity: .5; cursor: not-allowed; }

    /* ========================================================
       ACTIVE VIEW
       ======================================================== */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .status-bar.paused { border-color: var(--gold-dim); }

    .dot-live {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 1.4s infinite;
      flex-shrink: 0;
    }
    .dot-paused {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold-dim);
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    .status-text {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--text);
      flex: 1;
    }

    .timer {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      min-width: 44px;
      text-align: right;
    }

    .participants-bar {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .pchip {
      background: var(--bg3);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--text);
    }

    .match-type-badge {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 1px;
    }

    /* ========================================================
       MATCH ROWS
       ======================================================== */
    .matches-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .match-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--bg3);
    }

    .match-num {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--muted);
      width: 16px;
      flex-shrink: 0;
    }

    .match-players {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 17px;
    }

    .winner { color: var(--gold); font-weight: 600; }
    .loser  { color: var(--muted); }
    .vs     { color: var(--muted); font-size: 13px; }

    .crowns {
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
    }

    /* ========================================================
       FOOTER BUTTONS
       ======================================================== */
    .active-footer {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-cancel {
      width: 100%;
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: var(--radius);
      padding: 14px;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cancel:active { background: rgba(231,76,60,.15); }

    .btn-gold {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: var(--radius);
      padding: 14px;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-gold:active { background: rgba(245,200,66,.1); }

    .pause-msg {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ========================================================
       PODIO (complete)
       ======================================================== */
    .complete-view { text-align: center; }

    .complete-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 20px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .podio {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
    }

    .podio-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 18px;
      border: 1px solid var(--bg3);
    }

    .podio-row.rank-1 { border-color: var(--gold); box-shadow: 0 0 14px rgba(245,200,66,.15); }
    .podio-row.rank-2 { border-color: #aaa; }
    .podio-row.rank-3 { border-color: #c87d3e; }

    .medal { font-size: 24px; }

    .podio-name {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      text-align: left;
    }

    .podio-pts {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
    }

    .complete-footer { margin-top: 8px; }

    .btn-link {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      padding: 14px 28px;
      letter-spacing: 1px;
      transition: background .15s;
    }
    .btn-link:active { background: rgba(245,200,66,.1); }

    /* ========================================================
       UTILS
       ======================================================== */
    .empty-msg, .loading {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 20px 0;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: max(30px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg3);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 24px;
      font-size: 15px;
      white-space: nowrap;
      transition: transform .25s, opacity .25s;
      opacity: 0;
      z-index: 100;
      border: 1px solid var(--gold-dim);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <header>
    <div class="logo"><span>⚔️</span> Royal Arena</div>
    <a href="classifiche.html" class="nav-link">CLASSIF.</a>
  </header>

  <main>
    <div id="app">
      <p class="loading">Caricamento...</p>
    </div>
  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- App scripts -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/api.js"></script>
  <script src="js/home.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

</body>
</html>
