<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0f2e">
  <title>Statistiche — Royal Arena</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Cards giocatori */
    #stats-grid { display: flex; flex-direction: column; gap: 16px; }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--bg3);
    }

    .card-name { font-family: 'Cinzel', serif; font-size: 17px; color: var(--gold); }
    .card-tag  { font-family: 'Cinzel', serif; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    .card-body { padding: 14px 16px; }

    .loading-inline {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-style: italic;
      font-size: 15px;
      min-height: 48px;
    }

    /* Level + trofei */
    .level-trophy-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }

    .level-badge {
      background: var(--bg3);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .trophy-block { display: flex; align-items: baseline; gap: 6px; }
    .trophy-icon  { font-size: 18px; }
    .trophy-val   { font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold); }
    .trophy-best  { font-size: 13px; color: var(--muted); }

    /* Griglia 2x2 stat box */
    .stats-grid-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat-box {
      background: var(--bg3);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat-box.highlight { border: 1px solid var(--gold-dim); }

    .stat-box-val { font-family: 'Cinzel', serif; font-size: 20px; line-height: 1.2; }
    .stat-box.highlight .stat-box-val { color: var(--gold); }
    .stat-box-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Righe clan/arena */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-top: 1px solid var(--bg3);
      font-size: 15px;
    }
    .stat-row.muted { opacity: .7; }
    .stat-lbl  { color: var(--muted); }
    .clan-name { color: var(--gold); font-style: italic; }

    .error-inline { color: var(--red); font-size: 14px; padding: 8px 0; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="nav-link">← ARENA</a>
    <div class="logo">Statistiche</div>
  </header>

  <main>
    <div id="stats-grid">
      <p class="loading">Caricamento...</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/api.js"></script>
  <script src="js/statistiche.js"></script>

</body>
</html>
